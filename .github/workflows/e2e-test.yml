name: End-to-End Testing

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  e2e-test:
    name: "Run end-to-end test with log, witness and monitor"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Initialize log
        run: |
          go run ./cmd/gen-key --origin=binarytransparency.log/example
      
      - name: Initialize witness
        run: |
          sqlite3 -line witness.db '.database'
          go run ./cmd/witness-add-key --database-path witness.db --public-key public.key

      - name: Run witness
        run: |
          go run ./cmd/gen-key --origin=witness.log/example --private-key-path witness-private.key --public-key-path witness-public.key
          go run ./cmd/witness-server --database-path witness.db --private-key witness-private.key --public-key witness-public.key &

      - name: Run log
        run: |
          go run ./cmd/bt-log --storage-dir=/tmp/bt-log --private-key=private.key --public-key=public.key --witness-url="http://localhost:8081" --witness-public-key=witness-public.key &

      - name: Verify upload and output
        run: |
          curl -XPOST http://localhost:8080/add -d "{\"checksum\":\"sha256:5141b5b522d5df086d0ff0b110fbd9d21bb4fc7163af34d08286a2e846f6be92\",\"filename\":\"pkgname-1.2.3-py3-none-any.whl\"}" -o bundle
          cat bundle
          cat bundle| jq -r .checkpoint | base64 -d
          index=$(cat bundle | jq -r .index)
          if [ $index -ne 0 ]; then exit 1; else true; fi

      - name: Verify bulk append success
        run: |
          cat > bulk.ndjson <<'EOF'
          {"checksum":"sha256:1111111111111111111111111111111111111111111111111111111111111111","filename":"pkgname-1.2.4-py3-none-any.whl"}
          {"checksum":"sha256:2222222222222222222222222222222222222222222222222222222222222222","filename":"pkgname-1.2.5-py3-none-any.whl"}
          EOF
          curl -fsS -XPOST http://localhost:8080/admin/bulk/append \
            -H "Content-Type: application/x-ndjson" \
            --data-binary @bulk.ndjson \
            -o bulk-response.ndjson
          cat bulk-response.ndjson
          jq -s -e '.[0].type == "checkpoint"' bulk-response.ndjson
          jq -s -e '[.[] | select(.type == "result")] | length == 2' bulk-response.ndjson
          jq -s -e '[.[] | select(.type == "result") | .result.status] == ["logged", "logged"]' bulk-response.ndjson
          jq -s -e 'all(.[] | select(.type == "result"); (.result.index | type) == "number" and (.result.inclusionProof | type) == "array")' bulk-response.ndjson
          jq -s -e '.[-1].type == "complete" and .[-1].count == 2' bulk-response.ndjson

      - name: Verify bulk append duplicate handling
        run: |
          cat > bulk-duplicate.ndjson <<'EOF'
          {"checksum":"sha256:3333333333333333333333333333333333333333333333333333333333333333","filename":"pkgname-duplicate-1.0.0-py3-none-any.whl"}
          {"checksum":"sha256:4444444444444444444444444444444444444444444444444444444444444444","filename":"pkgname-duplicate-1.0.0-py3-none-any.whl"}
          EOF
          curl -fsS -XPOST http://localhost:8080/admin/bulk/append \
            -H "Content-Type: application/x-ndjson" \
            --data-binary @bulk-duplicate.ndjson \
            -o bulk-duplicate-response.ndjson
          cat bulk-duplicate-response.ndjson
          jq -s -e '[.[] | select(.type == "result") | .result.status] == ["logged", "error"]' bulk-duplicate-response.ndjson
          jq -s -e '([.[] | select(.type == "result")][0].result.filename) == "pkgname-duplicate-1.0.0-py3-none-any.whl"' bulk-duplicate-response.ndjson
          jq -s -e '([.[] | select(.type == "result")][1].result.error) == "duplicate filename in request"' bulk-duplicate-response.ndjson
          jq -s -e '.[-1].type == "complete" and .[-1].count == 2' bulk-duplicate-response.ndjson

      - name: Run monitor
        run: |
          go run ./cmd/bt-log-monitor --log-url http://localhost:8080 --public-key public.key --storage-dir /tmp/monitor --once=true --checksum-regex="sha256:5141b5b522d5df086d0ff0b110fbd9d21bb4fc7163af34d08286a2e846f6be92" --filename-regex="pkgname" --json-logging 2>log-output
          cat log-output
          checksum=$(cat log-output | jq -r .checksum)
          if [[ "$checksum" != "sha256:5141b5b522d5df086d0ff0b110fbd9d21bb4fc7163af34d08286a2e846f6be92" ]]; then exit 1; else true; fi
